services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      GENERIC_TIMEZONE: "${GENERIC_TIMEZONE:-Europe/Amsterdam}"
      TZ: "${TZ:-Europe/Amsterdam}"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_RESTRICT_FILE_ACCESS_TO: "${N8N_RESTRICT_FILE_ACCESS_TO:-/files;~/.n8n-files}"
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./local-files:/files
      - ./workflows:/workflows
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-appdb}"
      POSTGRES_USER: "${POSTGRES_USER:-appuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-for-local-dev}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-appuser}&p=${POSTGRES_PASSWORD:-change-me-for-local-dev}&d=${POSTGRES_DB:-appdb}"
      NC_AUTH_JWT_SECRET: "${NC_AUTH_JWT_SECRET:-change-me-for-anything-beyond-local-dev}"
      NC_DISABLE_TELE: "true"
      PORT: "8080"
    volumes:
      - ./nocodb-data:/usr/app/data
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: gotenberg
    restart: unless-stopped
